# E        +  where True = <built-in method containsPoint of QPolygonF object at 0x000001B0AE2833D0>((PyQt6.QtCore.QPointF(38.732050807568875, 0.9999999999999999) + (3 * Point(-0.500000, -0.577350))), <FillRule.OddEvenFill: 0>)
